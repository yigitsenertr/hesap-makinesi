workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: v20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          echo "android { defaultConfig { ndk { abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a' } } }" >> app/build.gradle
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: v20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build iOS
        script: |
          npx expo prebuild --platform ios --clean
          cd ios
          xcodebuild -workspace hesapmakinesi.xcworkspace \
            -scheme hesapmakinesi \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build
    artifacts:
      - ios/build/**/*.app
